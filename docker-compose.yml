version: "3.8"

# Production-ready GitOps Stack for Portainer
# Deployment Method: Portainer GitOps (Repository mode)

services:
  # ════════════════════════════════════════════════════════════════════════════════
  # PostgreSQL Database Service
  # ════════════════════════════════════════════════════════════════════════════════
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-unitaryx}-db
    restart: unless-stopped
    
    # Do not expose the DB to the host network in production for security.
    # If external access is required via Cloudflare Tunnel, it should route through the internal network.
    # ports:
    #   - "${POSTGRES_PORT:-5433}:5432"
    
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unitaryx}
      POSTGRES_USER: ${POSTGRES_USER:-unitaryx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:--c shared_buffers=256MB -c effective_cache_size=1GB}
      TZ: ${TZ:-Asia/Kolkata}
      PGTZ: ${TZ:-Asia/Kolkata}
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unitaryx} -d ${POSTGRES_DB:-unitaryx}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    
    # Preserve persistent volumes so data is not wiped on deployment
    volumes:
      - ${DB_VOLUME_PATH:-./data/db}:/var/lib/postgresql/data
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - unitaryx_net

  # ════════════════════════════════════════════════════════════════════════════════
  # Redis Service
  # ════════════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-unitaryx}-redis
    restart: unless-stopped
    volumes:
      - ${REDIS_VOLUME_PATH:-./data/redis}:/data
    networks:
      - unitaryx_net

  # ════════════════════════════════════════════════════════════════════════════════
  # Celery Worker
  # ════════════════════════════════════════════════════════════════════════════════
  worker:
    image: ghcr.io/unitary-x/unitaryx:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-unitaryx}-worker
    user: "1000:1000"
    command: celery -A backend.email_tasks worker --uid=1000 --loglevel=info --concurrency=1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    env_file:
      - .env.production # Optional: Portainer supports env files if they exist in repo, but it's better to use Portainer Env Vars.
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP=True
      # Passthrough all other DB and SMTP env vars here if needed.
    networks:
      - unitaryx_net

  # ════════════════════════════════════════════════════════════════════════════════
  # Flask Application
  # ════════════════════════════════════════════════════════════════════════════════
  app:
    image: ghcr.io/unitary-x/unitaryx:${APP_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-unitaryx}-app
    user: "1000:1000"
    restart: unless-stopped
    
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    
    # Let Portainer inject environment variables safely
    environment:
      TZ: ${TZ:-Asia/Kolkata}
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASS: ${ADMIN_PASS}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_NAME: ${SUPERADMIN_NAME}
      APP_PORT: ${APP_PORT:-10003}
      PORT: ${APP_PORT:-10003}
      
      POSTGRES_USER: ${POSTGRES_USER:-unitaryx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-unitaryx}
      
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-True}
      
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    
    # Reverse proxy mapping
    ports:
      - "${APP_PORT:-10003}:10003"
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:10003/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    
    volumes:
      - ${APP_VOLUME_PATH:-./data/app}:/app/data
      - ${APP_BACKUP_PATH:-./data/backups}:/app/instance/db_backups
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    networks:
      - unitaryx_net

# ════════════════════════════════════════════════════════════════════════════════
# Docker Networks & Volumes
# ════════════════════════════════════════════════════════════════════════════════
networks:
  unitaryx_net:
    name: ${COMPOSE_PROJECT_NAME:-unitaryx}-net
    driver: bridge

# Named volumes removed in favor of environment-routed bind mounts.
