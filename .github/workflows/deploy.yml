name: Deploy to Portainer (GitOps)

on:
  push:
    branches: [main, staging]
    paths:
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.dockerignore'
      - 'backend/**'
      - 'frontend/**'
      - 'requirements-docker.txt'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ${{ secrets.REGISTRY_URL }}
  IMAGE_NAME: unitaryx

jobs:
  # ════════════════════════════════════════════════════════════════════════════════
  # BUILD: Test & Build Docker Image
  # ════════════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python for testing
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docker.txt
      
      - name: Run linting checks
        continue-on-error: true
        run: |
          pip install pylint flake8
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          pylint backend/app.py --disable=all --enable=E,F || true
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ════════════════════════════════════════════════════════════════════════════════
  # DEPLOY-STAGING: Deploy to Staging Environment
  # ════════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' || github.event.inputs.environment == 'staging'
    
    environment:
      name: staging
      url: https://staging.unitaryx.org
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Portainer (Staging)
        uses: actions/github-script@v6
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_USERNAME: ${{ secrets.PORTAINER_USERNAME }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_STAGING_ENDPOINT_ID }}
          STACK_NAME: ${{ secrets.PORTAINER_STAGING_STACK_NAME }}
        with:
          script: |
            const fs = require('fs');
            const https = require('https');
            
            // Helper function for HTTPS requests
            async function httpsRequest(options, data = null) {
              return new Promise((resolve, reject) => {
                const req = https.request(options, (res) => {
                  let body = '';
                  res.on('data', (chunk) => body += chunk);
                  res.on('end', () => {
                    try {
                      resolve({
                        status: res.statusCode,
                        body: body ? JSON.parse(body) : null
                      });
                    } catch (e) {
                      resolve({
                        status: res.statusCode,
                        body: body
                      });
                    }
                  });
                });
                req.on('error', reject);
                if (data) req.write(JSON.stringify(data));
                req.end();
              });
            }
            
            const portainerUrl = process.env.PORTAINER_URL;
            const hostname = new URL(portainerUrl).hostname;
            const port = new URL(portainerUrl).port || 443;
            
            // Step 1: Authenticate
            console.log('🔐 Authenticating with Portainer...');
            const authResponse = await httpsRequest({
              hostname: hostname,
              port: port,
              path: '/api/auth',
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              rejectUnauthorized: false
            }, {
              Username: process.env.PORTAINER_USERNAME,
              Password: process.env.PORTAINER_PASSWORD
            });
            
            if (!authResponse.body.jwt) {
              throw new Error(`Auth failed: ${authResponse.status}`);
            }
            
            const token = authResponse.body.jwt;
            console.log('✓ Authentication successful');
            
            // Step 2: Get stack ID
            console.log('📋 Finding stack...');
            const stackResponse = await httpsRequest({
              hostname: hostname,
              port: port,
              path: `/api/stacks?filters={"Name":"${process.env.STACK_NAME}"}&endpointId=${process.env.PORTAINER_ENDPOINT_ID}`,
              method: 'GET',
              headers: { 'Authorization': `Bearer ${token}` },
              rejectUnauthorized: false
            });
            
            let stackId = stackResponse.body[0]?.Id;
            
            // Step 3: Read docker-compose.yml
            const composeContent = fs.readFileSync('docker-compose.yml', 'utf8');
            
            // Step 4: Read environment variables
            const envContent = fs.readFileSync('.env.staging', 'utf8');
            const envVars = envContent
              .split('\n')
              .filter(line => line.trim() && !line.startsWith('#'))
              .map(line => {
                const [name, ...rest] = line.split('=');
                return { name: name.trim(), value: rest.join('=').trim() };
              });
            
            // Step 5: Update or Create Stack
            if (stackId) {
              console.log(`📝 Updating stack (ID: ${stackId})...`);
              const updateResponse = await httpsRequest({
                hostname: hostname,
                port: port,
                path: `/api/stacks/${stackId}?endpointId=${process.env.PORTAINER_ENDPOINT_ID}`,
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                rejectUnauthorized: false
              }, {
                StackFileContent: composeContent,
                Env: envVars
              });
              
              if (updateResponse.status !== 200) {
                throw new Error(`Stack update failed: ${updateResponse.status}`);
              }
              console.log('✓ Stack updated successfully');
            } else {
              console.log('🆕 Creating new stack...');
              const createResponse = await httpsRequest({
                hostname: hostname,
                port: port,
                path: `/api/stacks?endpointId=${process.env.PORTAINER_ENDPOINT_ID}`,
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                rejectUnauthorized: false
              }, {
                Name: process.env.STACK_NAME,
                StackFileContent: composeContent,
                Env: envVars
              });
              
              if (createResponse.status !== 201) {
                throw new Error(`Stack creation failed: ${createResponse.status}`);
              }
              stackId = createResponse.body.Id;
              console.log(`✓ Stack created (ID: ${stackId})`);
            }
            
            console.log('🚀 Deployment initiated');
      
      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            if (context.payload.pull_request) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Deployed to staging environment: https://staging.unitaryx.org'
              });
            }

  # ════════════════════════════════════════════════════════════════════════════════
  # DEPLOY-PRODUCTION: Deploy to Production Environment
  # ════════════════════════════════════════════════════════════════════════════════
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url: https://unitaryx.org
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to Portainer (Production)
        uses: actions/github-script@v6
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_USERNAME: ${{ secrets.PORTAINER_USERNAME }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_PROD_ENDPOINT_ID }}
          STACK_NAME: ${{ secrets.PORTAINER_PROD_STACK_NAME }}
        with:
          script: |
            const fs = require('fs');
            const https = require('https');
            
            // Helper function for HTTPS requests
            async function httpsRequest(options, data = null) {
              return new Promise((resolve, reject) => {
                const req = https.request(options, (res) => {
                  let body = '';
                  res.on('data', (chunk) => body += chunk);
                  res.on('end', () => {
                    try {
                      resolve({
                        status: res.statusCode,
                        body: body ? JSON.parse(body) : null
                      });
                    } catch (e) {
                      resolve({
                        status: res.statusCode,
                        body: body
                      });
                    }
                  });
                });
                req.on('error', reject);
                if (data) req.write(JSON.stringify(data));
                req.end();
              });
            }
            
            const portainerUrl = process.env.PORTAINER_URL;
            const hostname = new URL(portainerUrl).hostname;
            const port = new URL(portainerUrl).port || 443;
            
            // Step 1: Authenticate
            console.log('🔐 Authenticating with Portainer...');
            const authResponse = await httpsRequest({
              hostname: hostname,
              port: port,
              path: '/api/auth',
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              rejectUnauthorized: false
            }, {
              Username: process.env.PORTAINER_USERNAME,
              Password: process.env.PORTAINER_PASSWORD
            });
            
            if (!authResponse.body.jwt) {
              throw new Error(`Auth failed: ${authResponse.status}`);
            }
            
            const token = authResponse.body.jwt;
            console.log('✓ Authentication successful');
            
            // Step 2: Get stack ID
            console.log('📋 Finding stack...');
            const stackResponse = await httpsRequest({
              hostname: hostname,
              port: port,
              path: `/api/stacks?filters={"Name":"${process.env.STACK_NAME}"}&endpointId=${process.env.PORTAINER_ENDPOINT_ID}`,
              method: 'GET',
              headers: { 'Authorization': `Bearer ${token}` },
              rejectUnauthorized: false
            });
            
            const stackId = stackResponse.body[0]?.Id;
            
            if (!stackId) {
              throw new Error('Production stack not found');
            }
            
            // Step 3: Read docker-compose.yml
            const composeContent = fs.readFileSync('docker-compose.yml', 'utf8');
            
            // Step 4: Read environment variables
            const envContent = fs.readFileSync('.env.production', 'utf8');
            const envVars = envContent
              .split('\n')
              .filter(line => line.trim() && !line.startsWith('#'))
              .map(line => {
                const [name, ...rest] = line.split('=');
                return { name: name.trim(), value: rest.join('=').trim() };
              });
            
            // Step 5: Update Stack
            console.log(`📝 Updating production stack (ID: ${stackId})...`);
            const updateResponse = await httpsRequest({
              hostname: hostname,
              port: port,
              path: `/api/stacks/${stackId}?endpointId=${process.env.PORTAINER_ENDPOINT_ID}`,
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
              rejectUnauthorized: false
            }, {
              StackFileContent: composeContent,
              Env: envVars
            });
            
            if (updateResponse.status !== 200) {
              throw new Error(`Stack update failed: ${updateResponse.status}`);
            }
            console.log('✓ Production stack updated successfully');
            console.log('🚀 Production deployment completed');
      
      - name: Notify deployment to Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚀 UnitaryX Production Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*UnitaryX Production Deployment*\nStatus: ✅ Success\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}\nURL: https://unitaryx.org"
                  }
                }
              ]
            }
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: Automatically deployed to production
          draft: false
          prerelease: false

  # ════════════════════════════════════════════════════════════════════════════════
  # HEALTH-CHECK: Verify deployment health
  # ════════════════════════════════════════════════════════════════════════════════
  health-check:
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Wait for app to be ready
        run: sleep 30
      
      - name: Health check (Staging)
        continue-on-error: true
        run: |
          curl -f -I https://staging.unitaryx.org/login || echo "⚠️ Health check failed, but continuing..."
      
      - name: Notify status
        run: echo "✓ Deployment health checks completed"
