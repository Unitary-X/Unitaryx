<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New task assigned</title>
</head>
<body style="margin:0; padding:0; background-color:#F3F6FC; font-family:'Segoe UI', Helvetica, Arial, sans-serif;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0;">{{ intro }}</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F3F6FC; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px; background-color:#FFFFFF; border-radius:20px; overflow:hidden; box-shadow:0 12px 32px rgba(31,53,147,0.10);">

          <tr>
            <td style="height:6px; background-color:#B8873E; font-size:0; line-height:0;">&nbsp;</td>
          </tr>

          <tr>
            <td style="padding:36px 40px 8px;">
              <span style="font-size:20px; font-weight:800; letter-spacing:0.03em; color:#10152B;">UNITARY <span style="color:#2F5CFF;">X</span></span>
            </td>
          </tr>

          <tr>
            <td style="padding:18px 40px 0;">
              <span style="display:inline-block; font-family:'Courier New', monospace; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#8A5A1E; background-color:#FBF2E2; padding:6px 12px; border-radius:999px;">Admin task assigned</span>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 40px 0;">
              <p style="margin:0 0 14px; font-size:20px; font-weight:800; color:#10152B; line-height:1.3;">{{ greeting }}</p>
              <p style="margin:0 0 22px; font-size:15px; line-height:1.6; color:#4A5170;">{{ intro }}</p>
            </td>
          </tr>

          <!-- task detail card -->
          <tr>
            <td style="padding:0 40px 24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F6F8FC; border:1px solid #EAF0FA; border-radius:14px;">
                <tr>
                  <td style="padding:20px 22px;">
                    <p style="margin:0 0 4px; font-family:'Courier New', monospace; font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:#8890AC;">Task</p>
                    <p style="margin:0 0 14px; font-size:16px; font-weight:700; color:#10152B;">{{ title }}</p>
                    <p style="margin:0 0 4px; font-family:'Courier New', monospace; font-size:11px; letter-spacing:0.05em; text-transform:uppercase; color:#8890AC;">Details</p>
                    <p style="margin:0; font-size:14px; line-height:1.6; color:#4A5170;">{{ details }}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:0 40px 28px;">
              <p style="margin:0; font-size:14px; line-height:1.6; color:#4A5170;">{{ body }}</p>
            </td>
          </tr>

          {% if app_url %}
          <tr>
            <td style="padding:0 40px 32px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" bgcolor="#10152B" style="border-radius:999px;">
                    <a href="{{ app_url }}" target="_blank" style="display:inline-block; padding:14px 30px; font-size:14px; font-weight:700; color:#FFFFFF; text-decoration:none; border-radius:999px;">{{ cta }} →</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          {% endif %}

          <tr>
            <td style="padding:0 40px;">
              <div style="border-top:1px solid #EAF0FA;"></div>
            </td>
          </tr>

          <tr>
            <td style="padding:24px 40px 36px;">
              <p style="margin:0; font-size:13px; color:#8890AC; line-height:1.6;">
                — The Unitary X Team<br>
                Assigned by {{ assigned_by }}.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
