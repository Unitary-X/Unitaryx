<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Unitary X</title>
</head>
<body style="margin:0; padding:0; background-color:#F3F6FC; font-family:'Segoe UI', Helvetica, Arial, sans-serif;">
  <!-- preheader (hidden preview text) -->
  <div style="display:none; max-height:0; overflow:hidden; opacity:0;">{{ intro }}</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F3F6FC; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px; background-color:#FFFFFF; border-radius:20px; overflow:hidden; box-shadow:0 12px 32px rgba(31,53,147,0.10);">

          <!-- top accent bar -->
          <tr>
            <td style="height:6px; background:linear-gradient(90deg,#2F5CFF,#1B3FCC 55%,#B8873E 110%); background-color:#2F5CFF; font-size:0; line-height:0;">&nbsp;</td>
          </tr>

          <!-- header / wordmark -->
          <tr>
            <td style="padding:36px 40px 8px;">
              <span style="font-size:20px; font-weight:800; letter-spacing:0.03em; color:#10152B;">UNITARY <span style="color:#2F5CFF;">X</span></span>
            </td>
          </tr>

          <!-- eyebrow -->
          <tr>
            <td style="padding:18px 40px 0;">
              <span style="display:inline-block; font-family:'Courier New', monospace; font-size:11px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:#1B3FCC; background-color:#EEF2FF; padding:6px 12px; border-radius:999px;">Welcome aboard</span>
            </td>
          </tr>

          <!-- greeting + copy -->
          <tr>
            <td style="padding:20px 40px 0;">
              <p style="margin:0 0 14px; font-size:22px; font-weight:800; color:#10152B; line-height:1.3;">{{ greeting }}</p>
              <p style="margin:0 0 14px; font-size:15px; line-height:1.6; color:#4A5170;">{{ intro }}</p>
              <p style="margin:0 0 28px; font-size:15px; line-height:1.6; color:#4A5170;">{{ body }}</p>
            </td>
          </tr>

          {% if app_url %}
          <!-- CTA button -->
          <tr>
            <td style="padding:0 40px 32px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" bgcolor="#10152B" style="border-radius:999px;">
                    <a href="{{ app_url }}" target="_blank" style="display:inline-block; padding:14px 30px; font-size:14px; font-weight:700; color:#FFFFFF; text-decoration:none; border-radius:999px;">{{ cta }} →</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          {% endif %}

          <!-- divider -->
          <tr>
            <td style="padding:0 40px;">
              <div style="border-top:1px solid #EAF0FA;"></div>
            </td>
          </tr>

          <!-- footer -->
          <tr>
            <td style="padding:24px 40px 36px;">
              <p style="margin:0; font-size:13px; color:#8890AC; line-height:1.6;">
                — The Unitary X Team<br>
                Engineering digital infrastructure for market leaders.
              </p>
            </td>
          </tr>

        </table>

        <!-- sub-footer -->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">
          <tr>
            <td align="center" style="padding:20px 20px 0;">
              <p style="margin:0; font-size:11px; color:#8890AC; font-family:'Courier New', monospace;">Unitary X · You're receiving this because you created an account.</p>
            </td>
          </tr>
        </table>

      </td>
    </tr>
  </table>
</body>
</html>
